name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLEW_PATH" ]; then
            DIR=$(dirname "$GRADLEW_PATH")
            echo "Found gradlew in $DIR"
            cd "$DIR"
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            echo "gradlew not found, building with system gradle"
            BUILD_PATH=$(find . -name "build.gradle*" | head -n 1)
            if [ -n "$BUILD_PATH" ]; then
              cd $(dirname "$BUILD_PATH")
            fi
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            **/build/outputs/apk/debug/*.apk
